name: Daily MLB Pitching Report

on:
  schedule:
    # Runs at 11:00 AM ET (15:00 UTC) every day — most previous-night games are final by then
    - cron: "0 15 * * *"
  workflow_dispatch: # Allow manual runs from the GitHub Actions UI

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas

      - name: Generate pitching report
        run: python export_pitching_report.py

      - name: Commit and push JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pitching_report.json
          git diff --cached --quiet || git commit -m "chore: update pitching report $(date -u +'%Y-%m-%d')"
          git push
